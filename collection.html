<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Collection — Krira Gallery</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Jost:wght@200;300;400&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #faf9f7; --bg2: #f2ede8; --text: #1a1714; --text2: #6b6560;
      --text3: #9e9892; --border: rgba(26,23,20,0.12); --border2: rgba(26,23,20,0.22);
    }
    html { scroll-behavior: smooth; }
    body { font-family: 'Jost', sans-serif; font-weight: 300; color: var(--text); background: var(--bg); min-height: 100vh; overflow-x: hidden; }
    nav { display: flex; justify-content: space-between; align-items: center; padding: 1.4rem 2.5rem; border-bottom: 0.5px solid var(--border); position: sticky; top: 0; background: var(--bg); z-index: 200; }
    .nav-logo { font-family: 'Cormorant Garamond', serif; font-size: 22px; font-weight: 300; letter-spacing: 0.1em; color: var(--text); text-decoration: none; }
    .nav-logo span { font-style: italic; }
    .nav-links { display: flex; gap: 2rem; list-style: none; }
    .nav-links li a { font-size: 11px; letter-spacing: 0.18em; text-transform: uppercase; color: var(--text2); text-decoration: none; transition: color 0.2s; }
    .nav-links li a:hover, .nav-links li a.active { color: var(--text); }
    .nav-inquire { font-size: 11px; letter-spacing: 0.14em; text-transform: uppercase; color: var(--text2); text-decoration: none; border-bottom: 0.5px solid var(--border2); padding-bottom: 1px; }
    .page-header { padding: 3rem 2.5rem 2rem; border-bottom: 0.5px solid var(--border); display: flex; justify-content: space-between; align-items: flex-end; }
    .page-eyebrow { font-size: 10px; letter-spacing: 0.25em; text-transform: uppercase; color: var(--text2); margin-bottom: 0.75rem; }
    .page-title { font-family: 'Cormorant Garamond', serif; font-size: 42px; font-weight: 300; }
    .page-count { font-size: 12px; color: var(--text3); letter-spacing: 0.1em; }
    .layout { display: grid; grid-template-columns: 200px 1fr; }
    .sidebar { border-right: 0.5px solid var(--border); padding: 2rem 1.5rem; position: sticky; top: 73px; height: fit-content; }
    .filter-group { margin-bottom: 1.75rem; }
    .filter-label { font-size: 10px; letter-spacing: 0.22em; text-transform: uppercase; color: var(--text2); margin-bottom: 0.75rem; display: block; }
    .filter-options { display: flex; flex-direction: column; gap: 0.4rem; }
    .filter-btn { font-family: 'Jost', sans-serif; font-size: 12px; font-weight: 300; color: var(--text2); background: none; border: none; cursor: pointer; text-align: left; padding: 4px 0; letter-spacing: 0.04em; transition: color 0.2s; display: flex; justify-content: space-between; }
    .filter-btn:hover, .filter-btn.active { color: var(--text); }
    .filter-btn.active { border-bottom: 0.5px solid var(--text); }
    .filter-count { font-size: 10px; color: var(--text3); }
    .filter-divider { border: none; border-top: 0.5px solid var(--border); margin: 1.25rem 0; }
    .clear-btn { font-size: 10px; letter-spacing: 0.15em; text-transform: uppercase; color: var(--text3); background: none; border: none; cursor: pointer; transition: color 0.2s; }
    .clear-btn:hover { color: var(--text2); }
    .grid-area { padding: 2rem; }
    .sort-bar { display: flex; justify-content: flex-end; align-items: center; gap: 1.5rem; margin-bottom: 1.5rem; padding-bottom: 1rem; border-bottom: 0.5px solid var(--border); }
    .sort-label { font-size: 11px; color: var(--text2); }
    .sort-select { font-family: 'Jost', sans-serif; font-size: 11px; color: var(--text); background: none; border: none; cursor: pointer; outline: none; }
    .masonry { columns: 3; column-gap: 1.25rem; }
    .art-item { break-inside: avoid; margin-bottom: 1.25rem; cursor: pointer; opacity: 0; transform: translateY(16px); transition: opacity 0.5s ease, transform 0.5s ease; }
    .art-item.visible { opacity: 1; transform: translateY(0); }
    .art-item-inner { position: relative; overflow: hidden; }
    .art-item-inner svg { width: 100%; display: block; transition: transform 0.6s cubic-bezier(0.25,0.46,0.45,0.94); }
    .art-item:hover .art-item-inner svg { transform: scale(1.04); }
    .art-hover-info { position: absolute; inset: 0; background: linear-gradient(to top, rgba(0,0,0,0.72) 0%, transparent 55%); opacity: 0; transition: opacity 0.3s; display: flex; flex-direction: column; justify-content: flex-end; padding: 1.25rem; }
    .art-item:hover .art-hover-info { opacity: 1; }
    .art-hover-title { font-family: 'Cormorant Garamond', serif; font-size: 18px; font-style: italic; color: #fff; margin-bottom: 3px; }
    .art-hover-artist { font-size: 10px; letter-spacing: 0.18em; text-transform: uppercase; color: rgba(255,255,255,0.65); }
    .art-hover-price { font-size: 11px; color: rgba(255,255,255,0.45); margin-top: 4px; }
    .art-meta { padding: 0.75rem 0 0; }
    .art-meta-title { font-family: 'Cormorant Garamond', serif; font-size: 15px; font-style: italic; }
    .art-meta-artist { font-size: 10px; letter-spacing: 0.12em; color: var(--text2); margin-top: 2px; text-transform: uppercase; }
    .lightbox { position: fixed; inset: 0; background: rgba(15,12,10,0.96); z-index: 1000; display: flex; align-items: center; justify-content: center; opacity: 0; pointer-events: none; transition: opacity 0.35s; }
    .lightbox.open { opacity: 1; pointer-events: all; }
    .lightbox-inner { display: grid; grid-template-columns: 1fr 340px; max-width: 1100px; width: 90vw; max-height: 88vh; background: var(--bg); overflow: hidden; }
    .lightbox-image { display: flex; align-items: center; justify-content: center; background: #1a1510; overflow: hidden; }
    .lightbox-image svg { max-height: 88vh; width: 100%; display: block; }
    .lightbox-info { padding: 2.5rem; display: flex; flex-direction: column; border-left: 0.5px solid var(--border); overflow-y: auto; }
    .lightbox-eyebrow { font-size: 9px; letter-spacing: 0.25em; text-transform: uppercase; color: var(--text3); margin-bottom: 1.25rem; }
    .lightbox-title { font-family: 'Cormorant Garamond', serif; font-size: 30px; font-weight: 300; font-style: italic; line-height: 1.15; margin-bottom: 0.5rem; }
    .lightbox-artist { font-size: 12px; letter-spacing: 0.15em; text-transform: uppercase; color: var(--text2); margin-bottom: 1.5rem; }
    .lightbox-divider { border: none; border-top: 0.5px solid var(--border); margin: 1rem 0; }
    .lightbox-meta-row { display: flex; flex-direction: column; gap: 0.7rem; margin-bottom: 0.5rem; }
    .meta-line { display: flex; justify-content: space-between; font-size: 12px; color: var(--text2); }
    .meta-line span:first-child { font-size: 10px; letter-spacing: 0.1em; text-transform: uppercase; color: var(--text3); }
    .lightbox-price { font-family: 'Cormorant Garamond', serif; font-size: 22px; margin-bottom: 1.5rem; }
    .lightbox-actions { margin-top: auto; display: flex; flex-direction: column; gap: 0.75rem; }
    .btn-primary { font-family: 'Jost', sans-serif; font-size: 11px; letter-spacing: 0.18em; text-transform: uppercase; padding: 13px 28px; background: var(--text); color: var(--bg); border: none; cursor: pointer; text-decoration: none; display: block; transition: opacity 0.2s; text-align: center; }
    .btn-primary:hover { opacity: 0.75; }
    .btn-ghost { font-family: 'Jost', sans-serif; font-size: 11px; letter-spacing: 0.18em; text-transform: uppercase; padding: 12px; background: none; color: var(--text2); border: none; cursor: pointer; text-decoration: none; border-bottom: 0.5px solid var(--border2); display: block; transition: color 0.2s; text-align: center; }
    .btn-ghost:hover { color: var(--text); }
    .lightbox-close { position: fixed; top: 1.5rem; right: 1.5rem; background: none; border: none; cursor: pointer; font-size: 20px; color: rgba(255,255,255,0.4); transition: color 0.2s; z-index: 1001; }
    .lightbox-close:hover { color: #fff; }
    .lightbox-nav { position: fixed; top: 50%; transform: translateY(-50%); background: none; border: none; cursor: pointer; color: rgba(255,255,255,0.35); font-size: 32px; font-weight: 200; padding: 1rem; transition: color 0.2s; z-index: 1001; }
    .lightbox-nav:hover { color: rgba(255,255,255,0.8); }
    .lightbox-nav.prev { left: 1rem; }
    .lightbox-nav.next { right: 360px; }
    footer { padding: 2rem 2.5rem; display: flex; justify-content: space-between; align-items: center; border-top: 0.5px solid var(--border); margin-top: 2rem; }
    .footer-logo { font-family: 'Cormorant Garamond', serif; font-size: 18px; font-weight: 300; }
    .footer-links { display: flex; gap: 1.5rem; list-style: none; }
    .footer-links li a { font-size: 10px; letter-spacing: 0.15em; text-transform: uppercase; color: var(--text2); text-decoration: none; }
    .footer-copy { font-size: 11px; color: var(--text3); }
    @media (max-width: 900px) { .layout { grid-template-columns: 1fr; } .sidebar { position: static; border-right: none; border-bottom: 0.5px solid var(--border); display: flex; gap: 1.5rem; flex-wrap: wrap; } .filter-group { margin-bottom: 0; } .filter-options { flex-direction: row; flex-wrap: wrap; gap: 0.5rem; } .masonry { columns: 2; } .lightbox-inner { grid-template-columns: 1fr; } .lightbox-nav.next { right: 1rem; } }
    @media (max-width: 580px) { .masonry { columns: 1; } nav { padding: 1.2rem 1.5rem; } .nav-links { display: none; } }
  </style>
</head>

  let activeFilters={medium:'all',year:'all',style:'all'};
  let currentIdx=0;
  let visible=[...works];

  function renderGrid(items){
    const g=document.getElementById('masonryGrid');
    g.innerHTML='';
    items.forEach((w,i)=>{
      const d=document.createElement('div');
      d.className='art-item';
      d.innerHTML=`<div class="art-item-inner">${w.svg}<div class="art-hover-info"><div class="art-hover-title">${w.title}</div><div class="art-hover-artist">${w.artist}</div><div class="art-hover-price">${w.price}</div></div></div><div class="art-meta"><div class="art-meta-title">${w.title}</div><div class="art-meta-artist">${w.artist}</div></div>`;
      d.addEventListener('click',()=>openLightbox(w,i));
      g.appendChild(d);
      setTimeout(()=>d.classList.add('visible'),40+i*25);
    });
    document.getElementById('workCount').textContent=`${items.length} works`;
  }

  function applyFilters(){
    visible=works.filter(w=>{
      const m=activeFilters.medium==='all'||w.medium===activeFilters.medium;
      const y=activeFilters.year==='all'||(activeFilters.year==='2022'?parseInt(w.year)<=2022:w.year===activeFilters.year);
      const s=activeFilters.style==='all'||w.style===activeFilters.style;
      return m&&y&&s;
    });
    const sort=document.getElementById('sortSelect').value;
    if(sort==='newest') visible.sort((a,b)=>b.year-a.year);
    else if(sort==='price-asc') visible.sort((a,b)=>a.priceVal-b.priceVal);
    else if(sort==='price-desc') visible.sort((a,b)=>b.priceVal-a.priceVal);
    renderGrid(visible);
  }

  document.querySelectorAll('.filter-btn').forEach(btn=>{
    btn.addEventListener('click',()=>{
      const t=btn.dataset.filter;
      document.querySelectorAll(`[data-filter="${t}"]`).forEach(b=>b.classList.remove('active'));
      btn.classList.add('active');
      activeFilters[t]=btn.dataset.value;
      applyFilters();
    });
  });

  document.getElementById('clearFilters').addEventListener('click',()=>{
    activeFilters={medium:'all',year:'all',style:'all'};
    document.querySelectorAll('.filter-btn').forEach(b=>b.classList.toggle('active',b.dataset.value==='all'));
    applyFilters();
  });

  document.getElementById('sortSelect').addEventListener('change',applyFilters);

  function openLightbox(w,idx){
    currentIdx=idx;
    document.getElementById('lbTitle').textContent=w.title;
    document.getElementById('lbArtist').textContent=w.artist;
    document.getElementById('lbPrice').textContent=w.price;
    document.getElementById('lightboxImage').innerHTML=w.svg;
    document.getElementById('lbMeta').innerHTML=`<div class="meta-line"><span>Medium</span><span>${w.medium.charAt(0).toUpperCase()+w.medium.slice(1)}</span></div><div class="meta-line"><span>Dimensions</span><span>${w.size}</span></div><div class="meta-line"><span>Year</span><span>${w.year}</span></div><div class="meta-line"><span>Style</span><span>${w.style.charAt(0).toUpperCase()+w.style.slice(1)}</span></div>`;
    document.getElementById('lightbox').classList.add('open');
    document.body.style.overflow='hidden';
  }

  function closeLightbox(){
    document.getElementById('lightbox').classList.remove('open');
    document.body.style.overflow='';
  }

  document.getElementById('lightboxClose').addEventListener('click',closeLightbox);
  document.getElementById('lightbox').addEventListener('click',e=>{if(e.target===e.currentTarget)closeLightbox();});
  document.getElementById('prevBtn').addEventListener('click',()=>{currentIdx=(currentIdx-1+visible.length)%visible.length;openLightbox(visible[currentIdx],currentIdx);});
  document.getElementById('nextBtn').addEventListener('click',()=>{currentIdx=(currentIdx+1)%visible.length;openLightbox(visible[currentIdx],currentIdx);});
  document.addEventListener('keydown',e=>{if(e.key==='Escape')closeLightbox();if(e.key==='ArrowLeft')document.getElementById('prevBtn').click();if(e.key==='ArrowRight')document.getElementById('nextBtn').click();});

  renderGrid(works);
  </script>
